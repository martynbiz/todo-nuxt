services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD:-kanban}@postgres:5432/${POSTGRES_DB:-kanban}
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      NUXT_OAUTH_MICROSOFT_CLIENT_ID: ${NUXT_OAUTH_MICROSOFT_CLIENT_ID}
      NUXT_OAUTH_MICROSOFT_CLIENT_SECRET: ${NUXT_OAUTH_MICROSOFT_CLIENT_SECRET}
      NUXT_OAUTH_MICROSOFT_TENANT: ${NUXT_OAUTH_MICROSOFT_TENANT}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban}
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
